<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Котик-Бегун: Погоня за Мемами - весёлая браузерная игра!">
    <title>Котик-Бегун: Погоня за Мемами 🐱</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Замена иконок lucide-react на эмодзи
        const Heart = ({className, size, fill}) => (
            <span style={{fontSize: size+'px', filter: fill ? 'none' : 'grayscale(100%)'}}>❤️</span>
        );
        const Trophy = ({className, size}) => (
            <span style={{fontSize: size+'px'}}>🏆</span>
        );

        const CatRunnerGame = () => {
          const [gameStarted, setGameStarted] = useState(false);
          const [gameOver, setGameOver] = useState(false);
          const [score, setScore] = useState(0);
          const [lives, setLives] = useState(3);
          const [catJumping, setCatJumping] = useState(false);
          const [catY, setCatY] = useState(0);
          const [catVelocity, setCatVelocity] = useState(0);
          const [isBouncing, setIsBouncing] = useState(false);
          const [slowMoCharges, setSlowMoCharges] = useState(2);
          const [isSlowMo, setIsSlowMo] = useState(false);
          const slowMoTimerRef = useRef(null);
          const [shieldCharges, setShieldCharges] = useState(2);
          const [isShieldActive, setIsShieldActive] = useState(false);
          const shieldTimerRef = useRef(null);
          const [obstacles, setObstacles] = useState([]);
          const [memes, setMemes] = useState([]);
          const [speed, setSpeed] = useState(5);
          const [isInvincible, setIsInvincible] = useState(false);
          const [isBlinking, setIsBlinking] = useState(false);
          const [lastObstacleX, setLastObstacleX] = useState(0);
          const [cloud1X, setCloud1X] = useState(100);
          const [cloud2X, setCloud2X] = useState(300);
          const [cloud3X, setCloud3X] = useState(600);
          const [eagleX, setEagleX] = useState(-200);
          const [eagleY, setEagleY] = useState(120);
          const [sunWinking, setSunWinking] = useState(false);
          const [mountain1X, setMountain1X] = useState(0);
          const [mountain2X, setMountain2X] = useState(400);
          const [mountain3X, setMountain3X] = useState(800);
          const [tree1X, setTree1X] = useState(100);
          const [tree2X, setTree2X] = useState(300);
          const [tree3X, setTree3X] = useState(500);
          const [musicEnabled, setMusicEnabled] = useState(true);
          const [timeOfDay, setTimeOfDay] = useState('day');
          const [raindrops, setRaindrops] = useState([]);
          const [lightnings, setLightnings] = useState([]);
          const [stars, setStars] = useState([]);
          const [showExitDialog, setShowExitDialog] = useState(false);
          const [isPaused, setIsPaused] = useState(false);
          const [umbrellaState, setUmbrellaState] = useState('hidden');
          const [mushrooms, setMushrooms] = useState([]);
          const [mushroomsCollected, setMushroomsCollected] = useState(0);
          const [showingMushrooms, setShowingMushrooms] = useState(false);
          const [showShop, setShowShop] = useState(false);
          const [selectedCatSkin, setSelectedCatSkin] = useState('default');
          const gameLoopRef = useRef(null);
          const physicsLoopRef = useRef(null);
          const cloudTimerRef = useRef(null);
          const eagleTimerRef = useRef(null);
          const winkTimerRef = useRef(null);
          const mountainTimerRef = useRef(null);
          const treeTimerRef = useRef(null);
          const musicIntervalRef = useRef(null);
          const activeOscillatorsRef = useRef([]);
          const timeOfDayTimerRef = useRef(null);
          const rainTimerRef = useRef(null);
          const lightningTimerRef = useRef(null);
          const mushroomTimerRef = useRef(null);

          const obstacleEmojis = ['🌵', '🪨', '💩', '🔥', '⚡'];
          const memeEmojis = ['🍕', '🍔', '🌮', '🍣', '🍩', '🧀', '🥓'];
          const catEmojis = ['😺', '😸', '😹', '😻', '🙀'];
          const [currentCat, setCurrentCat] = useState(0);

          const catSkins = {
            default: { emoji: '😺', name: 'Обычный котик', description: 'Классический милый котик' },
            hat: { emoji: '🎩', name: 'Котик в шляпе', description: 'Элегантный джентльмен-кот' },
            christmas: { emoji: '🎅', name: 'Новогодний котик', description: 'С бородой и новогодней шапкой' },
            halloween: { emoji: '🎃', name: 'Хэллоуин котик', description: 'Тыква, свечка, чёрный плащ и шляпка мага' }
          };

          const getCurrentCatEmoji = () => {
            if (selectedCatSkin === 'default') {
              return catEmojis[currentCat];
            }
            return catSkins[selectedCatSkin].emoji;
          };

          useEffect(() => {
            const newStars = [];
            for (let i = 0; i < 30; i++) {
              newStars.push({
                x: Math.random() * 1200,
                y: Math.random() * 250,
                size: Math.random() * 3 + 1,
                opacity: Math.random() * 0.5 + 0.5,
                twinkleSpeed: Math.random() * 2 + 1,
                id: i
              });
            }
            setStars(newStars);
          }, []);

          const audioContextRef = useRef(null);

          useEffect(() => {
            audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
          }, []);

          const stopAllMusic = () => {
            activeOscillatorsRef.current.forEach(osc => {
              try {
                osc.stop();
              } catch (e) {
              }
            });
            activeOscillatorsRef.current = [];
          };

          const playBackgroundMusic = () => {
            if (!audioContextRef.current || !musicEnabled) return;
            
            const ctx = audioContextRef.current;
            
            const melody = [
              { note: 330, duration: 0.15 }, { note: 330, duration: 0.15 }, { note: 0, duration: 0.15 },
              { note: 330, duration: 0.15 }, { note: 0, duration: 0.15 }, { note: 262, duration: 0.15 },
              { note: 330, duration: 0.15 }, { note: 0, duration: 0.15 }, { note: 392, duration: 0.15 },
              { note: 0, duration: 0.45 }, { note: 196, duration: 0.15 }, { note: 0, duration: 0.45 },
              { note: 262, duration: 0.15 }, { note: 0, duration: 0.3 }, { note: 196, duration: 0.15 },
              { note: 0, duration: 0.3 }, { note: 164, duration: 0.15 }, { note: 0, duration: 0.3 },
              { note: 220, duration: 0.15 }, { note: 0, duration: 0.15 }, { note: 247, duration: 0.15 },
              { note: 0, duration: 0.15 }, { note: 233, duration: 0.15 }, { note: 220, duration: 0.15 },
              { note: 0, duration: 0.15 }, { note: 196, duration: 0.2 }, { note: 330, duration: 0.2 },
              { note: 392, duration: 0.2 }, { note: 440, duration: 0.2 }, { note: 0, duration: 0.15 },
              { note: 349, duration: 0.15 }, { note: 392, duration: 0.15 }, { note: 0, duration: 0.15 },
              { note: 330, duration: 0.15 }, { note: 0, duration: 0.15 }, { note: 262, duration: 0.15 },
              { note: 294, duration: 0.15 }, { note: 247, duration: 0.2 }, { note: 0, duration: 0.3 },
              { note: 392, duration: 0.15 }, { note: 370, duration: 0.15 }, { note: 349, duration: 0.15 },
              { note: 311, duration: 0.15 }, { note: 0, duration: 0.15 }, { note: 330, duration: 0.15 },
              { note: 0, duration: 0.15 }, { note: 208, duration: 0.15 }, { note: 220, duration: 0.15 },
              { note: 262, duration: 0.15 }, { note: 0, duration: 0.15 }, { note: 220, duration: 0.15 },
              { note: 262, duration: 0.15 }, { note: 294, duration: 0.15 },
            ];
            
            let currentTime = ctx.currentTime;
            
            melody.forEach((note) => {
              if (note.note > 0) {
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(note.note, currentTime);
                
                gainNode.gain.setValueAtTime(0.08, currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, currentTime + note.duration);
                
                oscillator.start(currentTime);
                oscillator.stop(currentTime + note.duration);
                
                activeOscillatorsRef.current.push(oscillator);
              }
              
              currentTime += note.duration;
            });
          };

          const playGameOverMusic = () => {
            if (!audioContextRef.current || !musicEnabled) return;
            
            const ctx = audioContextRef.current;
            
            const gameOverMelody = [
              { note: 262, duration: 0.25 }, { note: 196, duration: 0.25 }, { note: 164, duration: 0.25 },
              { note: 0, duration: 0.15 }, { note: 220, duration: 0.2 }, { note: 247, duration: 0.2 },
              { note: 220, duration: 0.2 }, { note: 208, duration: 0.2 }, { note: 233, duration: 0.2 },
              { note: 208, duration: 0.2 }, { note: 196, duration: 0.3 }, { note: 0, duration: 0.2 },
              { note: 330, duration: 0.4 }, { note: 311, duration: 0.4 }, { note: 294, duration: 0.5 },
              { note: 0, duration: 0.3 }, { note: 196, duration: 0.6 },
            ];
            
            let currentTime = ctx.currentTime;
            
            gameOverMelody.forEach((note) => {
              if (note.note > 0) {
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(note.note, currentTime);
                
                gainNode.gain.setValueAtTime(0.12, currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, currentTime + note.duration);
                
                oscillator.start(currentTime);
                oscillator.stop(currentTime + note.duration);
              }
              
              currentTime += note.duration;
            });
          };

          useEffect(() => {
            if (gameStarted && !gameOver && musicEnabled) {
              playBackgroundMusic();
              musicIntervalRef.current = setInterval(() => {
                if (musicEnabled) {
                  playBackgroundMusic();
                }
              }, 9000);
              
              return () => {
                if (musicIntervalRef.current) {
                  clearInterval(musicIntervalRef.current);
                  musicIntervalRef.current = null;
                }
                stopAllMusic();
              };
            } else {
              if (musicIntervalRef.current) {
                clearInterval(musicIntervalRef.current);
                musicIntervalRef.current = null;
              }
              stopAllMusic();
            }
          }, [gameStarted, gameOver, musicEnabled]);

          useEffect(() => {
            if (gameOver && musicEnabled) {
              if (musicIntervalRef.current) {
                clearInterval(musicIntervalRef.current);
                musicIntervalRef.current = null;
              }
              stopAllMusic();
              
              setTimeout(() => {
                playGameOverMusic();
              }, 200);
            }
          }, [gameOver, musicEnabled]);

          const playJumpSound = () => {
            if (!audioContextRef.current || !musicEnabled) return;
            const ctx = audioContextRef.current;
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            oscillator.frequency.setValueAtTime(200, ctx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            
            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + 0.1);
          };

          const playLandSound = () => {
            if (!audioContextRef.current || !musicEnabled) return;
            const ctx = audioContextRef.current;
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(100, ctx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.4, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            
            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + 0.1);
          };

          const playHitSound = () => {
            if (!audioContextRef.current || !musicEnabled) return;
            const ctx = audioContextRef.current;
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(220, ctx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            
            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + 0.3);
          };

          const playCollectSound = () => {
            if (!audioContextRef.current || !musicEnabled) return;
            const ctx = audioContextRef.current;
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, ctx.currentTime);
            oscillator.frequency.setValueAtTime(1000, ctx.currentTime + 0.05);
            
            gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            
            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + 0.15);
          };

          useEffect(() => {
            if (!gameStarted || gameOver || isPaused) return;
            
            physicsLoopRef.current = setInterval(() => {
              if (catJumping) {
                const gravityModifier = isSlowMo ? 0.27 : 0.8;
                setCatVelocity(prev => prev - gravityModifier);
                setCatY(prev => {
                  const velocityModifier = isSlowMo ? 0.33 : 1;
                  const newY = prev + (catVelocity * velocityModifier);
                  
                  if (newY <= 0) {
                    setCatJumping(false);
                    setIsBouncing(true);
                    setCatVelocity(0);
                    playLandSound();
                    setTimeout(() => setIsBouncing(false), 150);
                    return 0;
                  }
                  
                  return newY;
                });
              }
            }, 16);
            
            return () => {
              if (physicsLoopRef.current) clearInterval(physicsLoopRef.current);
            };
          }, [catJumping, catVelocity, gameStarted, gameOver, isPaused, isSlowMo]);

          useEffect(() => {
            const winkIt = () => {
              setSunWinking(true);
              setTimeout(() => setSunWinking(false), 200);
            };
            
            winkTimerRef.current = setInterval(winkIt, 4000);
            
            return () => {
              if (winkTimerRef.current) clearInterval(winkTimerRef.current);
            };
          }, []);

          useEffect(() => {
            cloudTimerRef.current = setInterval(() => {
              setCloud1X(prev => prev + 0.5 > 1400 ? -100 : prev + 0.5);
              setCloud2X(prev => prev - 0.3 < -100 ? 1400 : prev - 0.3);
              setCloud3X(prev => prev + 0.7 > 1400 ? -100 : prev + 0.7);
            }, 50);
            
            return () => {
              if (cloudTimerRef.current) clearInterval(cloudTimerRef.current);
            };
          }, []);

          useEffect(() => {
            eagleTimerRef.current = setInterval(() => {
              setEagleX(prev => {
                if (prev < -200) {
                  setEagleY(100 + Math.random() * 100);
                  return 1400;
                }
                return prev - 3;
              });
            }, 50);
            
            return () => {
              if (eagleTimerRef.current) clearInterval(eagleTimerRef.current);
            };
          }, []);

          useEffect(() => {
            mountainTimerRef.current = setInterval(() => {
              setMountain1X(prev => prev - 0.2 < -600 ? 1200 : prev - 0.2);
              setMountain2X(prev => prev - 0.15 < -600 ? 1200 : prev - 0.15);
              setMountain3X(prev => prev - 0.25 < -600 ? 1200 : prev - 0.25);
            }, 50);
            
            return () => {
              if (mountainTimerRef.current) clearInterval(mountainTimerRef.current);
            };
          }, []);

          useEffect(() => {
            treeTimerRef.current = setInterval(() => {
              setTree1X(prev => prev - 1.5 < -100 ? 1300 : prev - 1.5);
              setTree2X(prev => prev - 1.3 < -100 ? 1300 : prev - 1.3);
              setTree3X(prev => prev - 1.7 < -100 ? 1300 : prev - 1.7);
            }, 50);
            
            return () => {
              if (treeTimerRef.current) clearInterval(treeTimerRef.current);
            };
          }, []);

          useEffect(() => {
            if (gameStarted && !gameOver && !isPaused) {
              if (timeOfDay === 'storm' && umbrellaState === 'hidden') {
                setUmbrellaState('opening');
                setTimeout(() => setUmbrellaState('open'), 500);
              } else if (timeOfDay !== 'storm' && (umbrellaState === 'open' || umbrellaState === 'opening')) {
                setUmbrellaState('closing');
                setTimeout(() => setUmbrellaState('hidden'), 500);
              }
            }
          }, [timeOfDay, gameStarted, gameOver, isPaused, umbrellaState]);

          useEffect(() => {
            if (!gameStarted || gameOver || isPaused) return;

            const cycleTimes = {
              day: 15000 + Math.random() * 5000,
              night: 15000 + Math.random() * 5000,
              storm: 5000
            };

            const scheduleNext = (currentPhase) => {
              const nextPhase = currentPhase === 'day' ? 'night' : currentPhase === 'night' ? 'storm' : 'day';
              const delay = cycleTimes[currentPhase];

              timeOfDayTimerRef.current = setTimeout(() => {
                setTimeOfDay(nextPhase);
                
                if (currentPhase === 'storm') {
                  setShowingMushrooms(true);
                  setMushroomsCollected(0);
                  
                  const newMushrooms = [];
                  for (let i = 0; i < 4; i++) {
                    newMushrooms.push({
                      x: 200 + i * 250,
                      emoji: '🍄',
                      type: 'small',
                      id: `mushroom-${i}`,
                      collected: false
                    });
                  }
                  newMushrooms.push({
                    x: 1150,
                    emoji: '🍄‍🟫',
                    type: 'big',
                    id: 'mushroom-big',
                    collected: false
                  });
                  
                  setMushrooms(newMushrooms);
                  
                  mushroomTimerRef.current = setTimeout(() => {
                    setShowingMushrooms(false);
                    setMushrooms([]);
                    setMushroomsCollected(0);
                  }, 5000);
                }
                
                scheduleNext(nextPhase);
              }, delay);
            };

            scheduleNext(timeOfDay);

            return () => {
              if (timeOfDayTimerRef.current) clearTimeout(timeOfDayTimerRef.current);
              if (mushroomTimerRef.current) clearTimeout(mushroomTimerRef.current);
            };
          }, [gameStarted, gameOver, timeOfDay, isPaused]);

          useEffect(() => {
            if (timeOfDay === 'storm' && gameStarted && !gameOver && !isPaused) {
              rainTimerRef.current = setInterval(() => {
                setRaindrops(prev => {
                  const updated = prev.map(drop => ({
                    ...drop,
                    y: drop.y + 15,
                    x: drop.x + 2
                  })).filter(drop => drop.y < 600);

                  if (Math.random() < 0.3) {
                    for (let i = 0; i < 3; i++) {
                      updated.push({
                        x: Math.random() * 1200,
                        y: -10,
                        id: Date.now() + Math.random()
                      });
                    }
                  }

                  return updated;
                });
              }, 50);

              return () => {
                if (rainTimerRef.current) clearInterval(rainTimerRef.current);
              };
            } else {
              setRaindrops([]);
              if (rainTimerRef.current) clearInterval(rainTimerRef.current);
            }
          }, [timeOfDay, gameStarted, gameOver, isPaused]);

          useEffect(() => {
            if (timeOfDay === 'storm' && gameStarted && !gameOver && !isPaused) {
              const createLightning = () => {
                const newLightning = {
                  x: Math.random() * 1100 + 50,
                  id: Date.now()
                };
                setLightnings(prev => [...prev, newLightning]);

                setTimeout(() => {
                  setLightnings(prev => prev.filter(l => l.id !== newLightning.id));
                }, 200);
              };

              createLightning();
              lightningTimerRef.current = setInterval(() => {
                if (Math.random() < 0.3) {
                  createLightning();
                }
              }, 1000);

              return () => {
                if (lightningTimerRef.current) clearInterval(lightningTimerRef.current);
              };
            } else {
              setLightnings([]);
              if (lightningTimerRef.current) clearInterval(lightningTimerRef.current);
            }
          }, [timeOfDay, gameStarted, gameOver, isPaused]);

          useEffect(() => {
            if (gameStarted && !gameOver && !isPaused) {
              gameLoopRef.current = setInterval(() => {
                setObstacles(prev => {
                  const updated = prev.map(obs => ({ ...obs, x: obs.x - speed }))
                    .filter(obs => obs.x > -100);
                  
                  const minDistance = 500;
                  const canSpawn = updated.length === 0 || updated.every(obs => obs.x < 1200 - minDistance);
                  
                  if (Math.random() < 0.012 && canSpawn) {
                    const newObstacle = {
                      x: 1200,
                      y: 70,
                      emoji: obstacleEmojis[Math.floor(Math.random() * obstacleEmojis.length)],
                      id: Date.now()
                    };
                    updated.push(newObstacle);
                    setLastObstacleX(1200);
                  }
                  return updated;
                });

                setMemes(prev => {
                  const updated = prev.map(meme => ({ ...meme, x: meme.x - speed }))
                    .filter(meme => meme.x > -100);
                  
                  if (Math.random() < 0.01) {
                    updated.push({
                      x: 1200,
                      y: Math.random() < 0.5 ? 30 : 70,
                      emoji: memeEmojis[Math.floor(Math.random() * memeEmojis.length)],
                      id: Date.now()
                    });
                  }
                  return updated;
                });

                setSpeed(prev => Math.min(prev + 0.0008, 10));
              }, 30);

              return () => {
                if (gameLoopRef.current) clearInterval(gameLoopRef.current);
              };
            }
          }, [gameStarted, gameOver, speed, isPaused]);

          useEffect(() => {
            if (!gameStarted || gameOver || isInvincible || isPaused || isShieldActive) return;

            obstacles.forEach(obs => {
              const catWidth = 56;
              const catHeight = 56;
              const catLeft = 132 + 12;
              const catBottom = 128 + catY + 12;
              const catRight = catLeft + catWidth;
              const catTop = catBottom + catHeight;
              
              const obsWidth = 49;
              const obsHeight = 49;
              const obsLeft = obs.x + 10;
              const obsRight = obsLeft + obsWidth;
              const obsBottom = 128 + 10;
              const obsTop = obsBottom + obsHeight;
              
              const overlapLeft = Math.max(catLeft, obsLeft);
              const overlapRight = Math.min(catRight, obsRight);
              const overlapBottom = Math.max(catBottom, obsBottom);
              const overlapTop = Math.min(catTop, obsTop);
              
              const hasOverlap = overlapRight > overlapLeft && overlapTop > overlapBottom;
              
              if (hasOverlap) {
                const overlapWidth = overlapRight - overlapLeft;
                const overlapHeight = overlapTop - overlapBottom;
                const overlapArea = overlapWidth * overlapHeight;
                
                const catArea = catWidth * catHeight;
                const obsArea = obsWidth * obsHeight;
                const minArea = Math.min(catArea, obsArea);
                
                const minRequiredOverlap = minArea * 0.4;
                
                if (overlapArea >= minRequiredOverlap && obs.y === 70) {
                  playHitSound();
                  setIsInvincible(true);
                  setIsBlinking(true);
                  
                  setLives(prev => {
                    const newLives = prev - 1;
                    if (newLives <= 0) {
                      setGameOver(true);
                    }
                    return newLives;
                  });
                  
                  setObstacles(prev => prev.filter(o => o.id !== obs.id));
                  setTimeout(() => setIsBlinking(false), 3000);
                  setTimeout(() => setIsInvincible(false), 3200);
                }
              }
            });

            memes.forEach(meme => {
              if (meme.x > 80 && meme.x < 180) {
                if ((meme.y === 30 && catJumping) || (meme.y === 70 && !catJumping)) {
                  playCollectSound();
                  setScore(prev => prev + 10);
                  setMemes(prev => prev.filter(m => m.id !== meme.id));
                  setCurrentCat(Math.floor(Math.random() * catEmojis.length));
                }
              }
            });

            if (showingMushrooms) {
              mushrooms.forEach(mushroom => {
                if (!mushroom.collected && mushroom.x > 80 && mushroom.x < 220) {
                  playCollectSound();
                  setMushrooms(prev => prev.map(m => 
                    m.id === mushroom.id ? { ...m, collected: true } : m
                  ));
                  setMushroomsCollected(prev => {
                    const newCount = prev + 1;
                    if (newCount === 5) {
                      setLives(prevLives => Math.min(prevLives + 1, 3));
                      if (audioContextRef.current && musicEnabled) {
                        const ctx = audioContextRef.current;
                        const osc1 = ctx.createOscillator();
                        const osc2 = ctx.createOscillator();
                        const gain = ctx.createGain();
                        
                        osc1.connect(gain);
                        osc2.connect(gain);
                        gain.connect(ctx.destination);
                        
                        osc1.frequency.setValueAtTime(523, ctx.currentTime);
                        osc1.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
                        osc1.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
                        
                        osc2.frequency.setValueAtTime(659, ctx.currentTime);
                        osc2.frequency.setValueAtTime(784, ctx.currentTime + 0.1);
                        osc2.frequency.setValueAtTime(1047, ctx.currentTime + 0.2);
                        
                        gain.gain.setValueAtTime(0.2, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                        
                        osc1.start(ctx.currentTime);
                        osc2.start(ctx.currentTime);
                        osc1.stop(ctx.currentTime + 0.4);
                        osc2.stop(ctx.currentTime + 0.4);
                      }
                    }
                    return newCount;
                  });
                }
              });
            }
          }, [obstacles, memes, mushrooms, showingMushrooms, catJumping, gameStarted, gameOver, isInvincible, catY, isPaused, isShieldActive, musicEnabled]);

          const jump = () => {
            if (!catJumping && gameStarted && !gameOver && !isPaused) {

            if (slowMoCharges > 0 && catJumping && !isSlowMo && gameStarted && !gameOver && !isPaused) {
              setIsSlowMo(true);
              setSlowMoCharges(prev => prev - 1);

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3);
                
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.3);
              }
              
              if (slowMoTimerRef.current) {
                clearInterval(slowMoTimerRef.current);
              }

              slowMoTimerRef.current = setInterval(() => {

                    slowMoTimerRef.current = null;

                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.setValueAtTime(800, ctx.currentTime + 0.1);
                osc.frequency.setValueAtTime(1000, ctx.currentTime + 0.2);

                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);

                osc.stop(ctx.currentTime + 0.3);

            setShowingMushrooms(false);

            if (shieldTimerRef.current) {

              shieldTimerRef.current = null;

            setMemes([]);
            setIsInvincible(false);
            setIsBlinking(false);
            setCatY(0);
            setCatVelocity(0);
            setCatJumping(false);
            setLastObstacleX(0);

            setRaindrops([]);
            setLightnings([]);

            setIsSlowMo(false);
            setShieldCharges(2);
            setIsShieldActive(false);
            setUmbrellaState('hidden');
            setMushrooms([]);
            setMushroomsCollected(0);
            setShowingMushrooms(false);
            if (slowMoTimerRef.current) {
              clearInterval(slowMoTimerRef.current);
              slowMoTimerRef.current = null;
            }
            if (shieldTimerRef.current) {
              clearTimeout(shieldTimerRef.current);
              shieldTimerRef.current = null;
            }
            if (mushroomTimerRef.current) {
              clearTimeout(mushroomTimerRef.current);
              mushroomTimerRef.current = null;
            }
            stopAllMusic();
          };

          const handleExitClick = (e) => {
            e.stopPropagation();
            setIsPaused(true);
            setShowExitDialog(true);
            
            if (audioContextRef.current && musicEnabled) {
              const ctx = audioContextRef.current;
              const currentTime = ctx.currentTime;
              
              if (ctx.state === 'running') {
                activeOscillatorsRef.current.forEach(osc => {
                  try {
                    if (osc.playbackRate) {
                      osc.playbackRate.setValueAtTime(1, currentTime);
                      osc.playbackRate.exponentialRampToValueAtTime(0.1, currentTime + 0.5);
                    }
                    osc.stop(currentTime + 0.5);
                  } catch (e) {
                  }
                });
              }
              
              const slowDownOsc = ctx.createOscillator();
              const slowDownGain = ctx.createGain();
              
              slowDownOsc.connect(slowDownGain);
              slowDownGain.connect(ctx.destination);
              
              slowDownOsc.type = 'sine';
              slowDownOsc.frequency.setValueAtTime(440, currentTime);
              slowDownOsc.frequency.exponentialRampToValueAtTime(110, currentTime + 0.8);
              
              slowDownGain.gain.setValueAtTime(0.15, currentTime);
              slowDownGain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.8);
              
              slowDownOsc.start(currentTime);
              slowDownOsc.stop(currentTime + 0.8);

              gain.connect(ctx.destination);

              gain.gain.setValueAtTime(0.2, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);

              osc.stop(ctx.currentTime + 0.2);

                e.preventDefault();
                if (!gameStarted && !isPaused) {
                  startGame();
                } else if (!isPaused) {
                  jump();
                }

              if (e.code === 'KeyS' || e.code === 'ArrowDown') {
                e.preventDefault();
                if (gameStarted && !gameOver && !isPaused) {
                  activateSlowMo();
                }

              if (e.code === 'KeyD' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                e.preventDefault();
                if (gameStarted && !gameOver && !isPaused) {
                  activateShield();
                }
              }
            };
            window.addEventListener('keydown', handleKeyPress);
            return () => window.removeEventListener('keydown', handleKeyPress);

                            top: '50%',
                            transformOrigin: 'center',
                            transform: `translate(-50%, -50%) rotate(${angle}deg) translateY(-45px)`
                          }}
                        />
                      ))}
                    </div>
                    <div className="text-7xl relative z-10">
                      {sunWinking ? '😉' : '😊'}
                    </div>
                  </div>
                </div>
              )}

              {timeOfDay === 'night' && (
                <div className="absolute top-8 right-12 z-10 transition-opacity duration-1000">
                  <div className="text-8xl" style={{ animation: 'pulse 3s ease-in-out infinite' }}>
                    🌙
                  </div>
                </div>
              )}

              {timeOfDay === 'night' && stars.slice(0, 30).map(star => (
                <div
                  key={star.id}
                  className="absolute rounded-full bg-white"
                  style={{
                    left: `${star.x}px`,
                    top: `${star.y}px`,
                    width: `${star.size}px`,
                    height: `${star.size}px`,
                    opacity: star.opacity,
                    animation: `twinkle ${star.twinkleSpeed}s infinite`
                  }}
                />
              ))}

              {timeOfDay !== 'storm' && (
                <>
                  <div 
                    className={`absolute text-6xl transition-opacity duration-1000 ${timeOfDay === 'night' ? 'opacity-30' : 'opacity-70'}`} 
                    style={{ left: `${cloud1X}px`, top: '40px' }}
                  >
                    ☁️
                  </div>
                  <div 
                    className={`absolute text-5xl transition-opacity duration-1000 ${timeOfDay === 'night' ? 'opacity-25' : 'opacity-60'}`} 
                    style={{ left: `${cloud2X}px`, top: '80px' }}
                  >
                    ☁️
                  </div>
                  <div 
                    className={`absolute text-7xl transition-opacity duration-1000 ${timeOfDay === 'night' ? 'opacity-20' : 'opacity-50'}`} 
                    style={{ left: `${cloud3X}px`, top: '120px' }}
                  >
                    ☁️
                  </div>
                </>
              )}

              {timeOfDay === 'storm' && (
                <>
                  <div className="absolute text-8xl opacity-90" style={{ left: `${cloud1X}px`, top: '30px' }}>⛈️</div>
                  <div className="absolute text-9xl opacity-95" style={{ left: `${cloud2X + 200}px`, top: '50px' }}>⛈️</div>
                  <div className="absolute text-8xl opacity-90" style={{ left: `${cloud3X}px`, top: '80px' }}>⛈️</div>
                </>

              {lightnings.map(lightning => (
                <div

                    top: '100px',
                    animation: 'flash 0.2s ease-out'
                  }}

                  ⚡

                <div

                      ? 'opacity-30'
                      : 'opacity-20'

                  style={{ left: `${mountain1X}px`, bottom: '0px' }}

                <div

                      : 'opacity-18'

                  style={{ left: `${mountain2X}px`, bottom: '10px' }}
                >

                </div>
                <div
                  className={`absolute text-9xl transition-opacity duration-1000 ${
                    timeOfDay === 'day' 
                      ? 'opacity-38' 
                      : timeOfDay === 'night'
                      ? 'opacity-28'
                      : 'opacity-19'
                  }`}
                  style={{ left: `${mountain3X}px`, bottom: '5px' }}
                >
                  🏔️
                </div>
              </div>

              <div className="absolute bottom-32 left-0 right-0 h-48 overflow-hidden z-5">
                <div
                  className={`absolute text-7xl transition-opacity duration-1000 ${
                    timeOfDay === 'day' 
                      ? 'opacity-60' 
                      : timeOfDay === 'night'
                      ? 'opacity-40'
                      : 'opacity-35'
                  }`}
                  style={{ left: `${tree1X}px`, bottom: '0px' }}
                >
                  🌲

                <div
                  className={`absolute text-6xl transition-opacity duration-1000 ${

                      ? 'opacity-38'
                      : 'opacity-33'

                >
                  🌳
                </div>
                <div
                  className={`absolute text-7xl transition-opacity duration-1000 ${

                      : 'opacity-34'

                  🌲

              {gameStarted && !gameOver && (

                    onClick={(e) => {
                      e.stopPropagation();

                >
                  🕸️
                </button>

              {gameStarted && !gameOver && (
                <button

                    activateShield();

                  disabled={shieldCharges === 0 || isShieldActive}
                  className={`fixed bottom-6 right-6 z-[100] bg-white bg-opacity-90 rounded-full w-16 h-16 flex items-center justify-center text-4xl shadow-lg transition-all ${

                      : 'opacity-50 cursor-not-allowed'

              )}

              {showExitDialog && (
                <div className="absolute inset-0 flex items-center justify-center z-50 bg-black bg-opacity-50">
                  <div className="bg-white bg-opacity-95 rounded-3xl p-12 text-center shadow-2xl max-w-lg">
                    <div className="text-8xl mb-4 animate-bounce">😿</div>
                    <h2 className="text-4xl font-bold mb-6 text-purple-600">Ты точно хочешь выйти?</h2>
                    <p className="text-xl mb-8 text-gray-700">Твой прогресс будет потерян!</p>
                    <div className="flex gap-4 justify-center">
                      <button
                        onClick={returnToMenu}
                        className="bg-gradient-to-r from-red-500 to-orange-500 text-white text-xl font-bold px-8 py-3 rounded-full hover:scale-110 transition-transform shadow-lg"
                      >
                        Да, выйти
                      </button>
                      <button
                        onClick={cancelExit}
                        className="bg-gradient-to-r from-green-500 to-blue-500 text-white text-xl font-bold px-8 py-3 rounded-full hover:scale-110 transition-transform shadow-lg"
                      >
                        Нет, остаться
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {showShop && (
                <div className="absolute inset-0 flex items-center justify-center z-50 bg-black bg-opacity-50" onClick={closeShop}>
                  <div className="bg-white bg-opacity-95 rounded-3xl p-12 text-center shadow-2xl max-w-4xl" onClick={(e) => e.stopPropagation()}>
                    <div className="text-6xl mb-4">🛒</div>
                    <h2 className="text-5xl font-bold mb-6 text-purple-600">МАГАЗИН СКИНОВ</h2>
                    <p className="text-xl mb-8 text-gray-700">Выбери внешность для своего котика!</p>
                    
                    <div className="grid grid-cols-2 gap-6 mb-8">
                      {Object.entries(catSkins).map(([key, skin]) => (
                        <div
                          key={key}
                          onClick={(e) => selectSkin(key, e)}
                          className={`bg-gradient-to-br p-6 rounded-2xl cursor-pointer transition-all hover:scale-105 shadow-lg ${
                            selectedCatSkin === key
                              ? 'from-yellow-300 to-orange-300 ring-4 ring-yellow-500'
                              : 'from-purple-200 to-pink-200 hover:from-purple-300 hover:to-pink-300'
                          }`}
                        >
                          <div className="text-8xl mb-3">{skin.emoji}</div>
                          <h3 className="text-2xl font-bold mb-2 text-purple-800">{skin.name}</h3>
                          <p className="text-sm text-gray-700">{skin.description}</p>
                          {selectedCatSkin === key && (
                            <div className="mt-3 text-xl font-bold text-green-600">✓ ВЫБРАН</div>
                          )}
                        </div>
                      ))}
                    </div>
                    
                    <button
                      onClick={closeShop}
                      className="bg-gradient-to-r from-green-500 to-blue-500 text-white text-2xl font-bold px-12 py-4 rounded-full hover:scale-110 transition-transform shadow-lg"
                    >
                      ЗАКРЫТЬ
                    </button>
                  </div>
                </div>
              )}

              <div className={`absolute bottom-0 left-0 right-0 h-32 transition-colors duration-1000 ${
                timeOfDay === 'day' 
                  ? 'bg-gradient-to-t from-green-600 to-green-400'
                  : timeOfDay === 'night'
                  ? 'bg-gradient-to-t from-green-900 to-green-700'
                  : 'bg-gradient-to-t from-green-800 to-green-600'
              }`} />
              <div className={`absolute bottom-32 left-0 right-0 h-2 transition-colors duration-1000 ${
                timeOfDay === 'day' 
                  ? 'bg-yellow-600'
                  : timeOfDay === 'night'
                  ? 'bg-yellow-800'
                  : 'bg-yellow-700'
              }`} />

              {gameStarted && (
                <>
                  {isShieldActive && (
                    <div
                      className="absolute pointer-events-none"
                      style={{
                        left: '132px',
                        bottom: `${128 + catY}px`,
                        width: '160px',
                        height: '160px',
                        transform: 'translate(-50px, -50px)',
                        zIndex: 5
                      }}
                    >
                      <div className="absolute inset-0 rounded-full bg-gradient-to-r from-blue-400 via-cyan-300 to-blue-400 opacity-30 blur-2xl animate-spin" style={{ animationDuration: '2s' }}></div>
                      <div className="absolute inset-0 m-4 rounded-full bg-gradient-to-r from-cyan-400 via-blue-300 to-cyan-400 opacity-50 blur-xl animate-spin" style={{ animationDuration: '1.5s', animationDirection: 'reverse' }}></div>
                      <div className="absolute inset-0 m-8 rounded-full border-4 border-blue-400 opacity-70 animate-ping" style={{ animationDuration: '1s' }}></div>
                      <div className="absolute top-2 left-8 text-3xl animate-bounce" style={{ animationDelay: '0s' }}>✨</div>
                      <div className="absolute top-2 right-8 text-3xl animate-bounce" style={{ animationDelay: '0.2s' }}>✨</div>
                      <div className="absolute bottom-2 left-16 text-3xl animate-bounce" style={{ animationDelay: '0.4s' }}>✨</div>
                      <div className="absolute bottom-2 right-16 text-3xl animate-bounce" style={{ animationDelay: '0.6s' }}>✨</div>
                      <div className="absolute -top-8 left-1/2 transform -translate-x-1/2 text-5xl animate-pulse">
                        🛡️
                      </div>
                    </div>
                  )}
                  
                  {(umbrellaState === 'opening' || umbrellaState === 'open' || umbrellaState === 'closing') && (
                    <div
                      className="absolute pointer-events-none transition-all duration-500"
                      style={{
                        left: '160px',
                        bottom: `${190 + catY}px`,
                        zIndex: 9,
                        transform: umbrellaState === 'opening' 
                          ? 'scale(0.3) translateY(20px)' 
                          : umbrellaState === 'closing' 
                          ? 'scale(0.3) translateY(20px)' 
                          : 'scale(1) translateY(0)',
                        opacity: umbrellaState === 'opening' 
                          ? 0.5 
                          : umbrellaState === 'closing' 
                          ? 0.5 
                          : 1
                      }}
                    >
                      <div className="text-7xl">☂️</div>
                    </div>
                  )}
                  
                  <div
                    className={`absolute left-32 text-8xl transition-all ${
                      isBlinking ? 'animate-pulse opacity-50' : ''
                    }`}
                    style={{
                      bottom: `${128 + catY}px`,
                      animation: isBlinking ? 'blink 0.2s infinite' : 'none',
                      transform: isBouncing ? 'scaleY(0.85) scaleX(1.1)' : catJumping && catVelocity > 0 ? 'rotate(-15deg)' : catJumping ? 'rotate(10deg)' : 'scaleY(1) scaleX(1)',
                      transition: isBouncing ? 'transform 0.15s ease-out' : 'transform 0.1s ease-out',
                      zIndex: 10
                    }}
                  >
                    {getCurrentCatEmoji()}
                  </div>
                </>
              )}

              {obstacles.map(obs => (
                <div
                  key={obs.id}
                  className="absolute text-7xl"
                  style={{
                    left: `${obs.x}px`,
                    bottom: obs.y === 70 ? '128px' : '200px',
                  }}
                >
                  {obs.emoji}
                </div>
              ))}

              {memes.map(meme => (
                <div
                  key={meme.id}
                  className="absolute text-6xl animate-pulse"
                  style={{
                    left: `${meme.x}px`,
                    bottom: meme.y === 70 ? '128px' : '250px',
                  }}
                >
                  {meme.emoji}
                </div>
              ))}

              {showingMushrooms && mushrooms.map(mushroom => (
                !mushroom.collected && (
                  <div
                    key={mushroom.id}
                    className="absolute animate-bounce"
                    style={{
                      left: `${mushroom.x}px`,
                      bottom: '128px',
                      fontSize: mushroom.type === 'big' ? '4rem' : '3rem',
                      animationDuration: '1s'
                    }}
                  >
                    {mushroom.emoji}
                  </div>
                )
              ))}

              {gameStarted && !gameOver && (
                <div className="absolute bottom-3 left-1/2 transform -translate-x-1/2 text-white text-sm font-bold bg-black bg-opacity-50 px-4 py-2 rounded-full">
                  {showingMushrooms 
                    ? `🍄 СОБЕРИ ВСЕ ГРИБЫ! (${mushroomsCollected}/5) = +1 жизнь ❤️` 
                    : isSlowMo 
                    ? '🕸️ ЗАМЕДЛЕНИЕ АКТИВНО!' 
                    : isShieldActive 
                    ? '🛡️ ЩИТ АКТИВЕН!' 
                    : 'ПРОБЕЛ = прыжок | S = паутинка 🕸️ | D = щит 🛡️'}
                </div>
              )}

              <style>{`
                @keyframes blink {
                  0%, 49% { opacity: 1; }
                  50%, 100% { opacity: 0.2; }
                }
                @keyframes twinkle {
                  0%, 100% { opacity: 1; }
                  50% { opacity: 0.3; }
                }
                @keyframes flash {
                  0% { opacity: 0; transform: scale(0.5); }
                  50% { opacity: 1; transform: scale(1.2); }
                  100% { opacity: 0; transform: scale(1); }
                }
                @keyframes spin {
                  from { transform: rotate(0deg); }
                  to { transform: rotate(360deg); }
                }
                @keyframes pulse {
                  0%, 100% { opacity: 1; }
                  50% { opacity: 0.7; }
                }
              `}</style>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CatRunnerGame />);
    </script>
</body>
</html>
